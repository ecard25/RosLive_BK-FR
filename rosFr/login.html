<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso - Plataforma Virtual</title>

  <!-- Configuración PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">

  <!-- Tipografía moderna (Inter) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Reset y Variables Globales - Light Mode */
    :root {
      --bg-gradient: #f4f6f9;
      --card-bg: #ffffff;
      --card-border: rgba(0, 0, 0, 0.08);
      --text-main: #2d3748;
      --text-muted: #718096;
      --primary: #3182ce;
      --primary-hover: #2b6cb0;
      --accent: linear-gradient(90deg, #3182ce, #2b6cb0);
      --danger: #e53e3e;
      --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      overflow-y: auto;
      overflow-x: hidden;
    }

    /* Diseño Minimalista para la Tarjeta de Login */
    .login-wrapper {
      width: 100%;
      max-width: 480px;
      margin: auto;
      padding: 2rem 1rem;
      perspective: 1000px;
      overflow-y: auto;
    }

    .login-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--shadow-soft);
      animation: fadeIn 0.8s ease-out forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    @media (min-width: 768px) {
      .login-card {
        padding: 2.5rem 3rem 0.5rem 3rem;
      }

      .login-header h1 {
        font-size: 2rem;
      }

      .form-control {
        font-size: 1.05rem;
        padding: 1rem 1.2rem;
      }

      .btn-primary {
        font-size: 1.1rem;
        padding: 1.2rem;
      }


    }


    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-header h1 {
      font-size: 1.45rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text-main);
    }

    .login-header p {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    /* Formularios y Controles */
    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-control {
      width: 100%;
      background: #f8fafc;
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 0.875rem 1rem;
      border-radius: 8px;
      font-size: 1rem;
      text-align: center;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-control:focus {
      border-color: var(--primary);
      background: #ffffff;
      box-shadow: 0 0 0 3px rgba(49, 130, 206, 0.2);
    }

    .form-control::placeholder {
      color: #a0aec0;
    }

    /* Botón de Acción Principal */
    .btn-primary {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 1rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -5px rgba(49, 130, 206, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    /* Mensaje de Error */
    .error-msg {
      color: var(--danger);
      font-size: 0.875rem;
      text-align: center;
      margin-top: 1rem;
      min-height: 1.2rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .error-msg.visible {
      opacity: 1;
    }

    @media (max-width: 360px) {
      .login-header h1 {
        font-size: 1.08rem;
      }

      .login-header p {
        font-size: 0.75rem;
      }
    }

    /* Estilos para imágenes decorativas responsivas */
    .deco-img {
      position: fixed;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    /* Vista Escritorio (min-width: 1025px) */
    @media (min-width: 1025px) {
      body {
        position: relative;
        overflow: hidden;
      }

      .img-mary {
        display: block;
        position: fixed;
        left: 5%;
        top: 48%;
        transform: translateY(-50%);
        max-height: 65vh;
        max-width: 25vw;
        object-fit: contain;
      }

      .img-desktop-right {
        display: block;
        position: fixed;
        left: 0;
        bottom: 0;
        width: 100%;
        max-height: 45vh;
        object-fit: cover;
        object-position: bottom;
      }

      .img-mobile-bottom {
        display: none;
      }
    }

    /* Vista Móvil y Tablets (max-width: 1024px) */
    @media (max-width: 1024px) {
      body {
        position: relative;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        padding-top: 24vh;
        padding-bottom: 24vh;
        min-height: 100vh;
        overflow-y: auto;
      }

      .login-wrapper {
        margin: auto 0;
        padding: 0rem 1rem;
        z-index: 10;
        position: relative;
      }

      .img-mary {
        display: block;
        position: absolute;
        top: 2vh;
        left: 50%;
        transform: translateX(-50%);
        max-height: 20vh;
        max-width: 80vw;
        object-fit: contain;
      }

      .img-desktop-right {
        display: none;
      }

      .img-mobile-bottom {
        display: block;
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        max-height: 22vh;
        max-width: 100vw;
        object-fit: contain;
      }
    }
  </style>
</head>

<body>

  <!-- Imágenes decorativas responsivas -->
  <img src="assets/mary05.png" class="deco-img img-mary" alt="Virgen María">
  <img src="assets/login11e5.png" class="deco-img img-desktop-right" alt="Decoración Abajo">
  <img src="assets/login10c.png" class="deco-img img-mobile-bottom" alt="Decoración Abajo Móvil">

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-header">
        <h1>Rosario Católico en vivo</h1>
        <p>Inicia sesión para entrar</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="usuario">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"
              style="vertical-align: middle; margin-right: 4px;">
              <line x1="12" y1="4" x2="12" y2="20"></line>
              <line x1="7" y1="9" x2="17" y2="9"></line>
            </svg>Usuario
          </label>
          <input type="text" id="usuario" class="form-control" placeholder="" required autocomplete="username">
        </div>

        <div class="form-group">
          <label for="contrasena">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"
              style="vertical-align: middle; margin-right: 4px;">
              <line x1="12" y1="4" x2="12" y2="20"></line>
              <line x1="7" y1="9" x2="17" y2="9"></line>
            </svg>Contraseña
          </label>
          <input type="password" id="contrasena" class="form-control" placeholder="" required
            autocomplete="current-password">
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">Entrar</button>
        <div id="errorMsg" class="error-msg">Datos incorrectos o error de conexión.</div>
      </form>
    </div>
  </div>

  <script>
    const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
      ? 'http://127.0.0.1:8000/api'
      : 'https://rosarioenvivo.com/api';

    // Registro básico del Service Worker para PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(err => {
          console.warn('Fallo registro ServiceWorker:', err);
        });
      });
    }

    const loginForm = document.getElementById('loginForm');
    const usuarioInput = document.getElementById('usuario');
    const contrasenaInput = document.getElementById('contrasena');
    const errorMsg = document.getElementById('errorMsg');
    const submitBtn = document.getElementById('submitBtn');

    /**
     * Intercepta el evento submit para enviar peticiones al backend mediante API Fetch.
     */
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault(); // Previene recarga de página por defecto

      const usuario = usuarioInput.value.trim();
      const contrasena = contrasenaInput.value.trim();

      // Validación simple
      if (!usuario || !contrasena) return;

      // Estado de carga
      submitBtn.textContent = "Verificando...";
      submitBtn.disabled = true;
      submitBtn.style.opacity = '0.7';
      errorMsg.classList.remove('visible');

      try {
        // Petición POST JSON al backend (FastAPI)
        const response = await fetch(`${API_BASE_URL}/usuarios/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ usuario, contrasena })
        });

        if (!response.ok) {
          throw new Error('Autenticación fallida');
        }

        const data = await response.json();

        // CORRECCIÓN CRÍTICA: Se añade soporte para 'access_token' que es el estándar de FastAPI
        const tokenValido = data.access_token || data.token;

        // Al recibir el token, lo guardamos en el almacenamiento local del navegador
        if (tokenValido) {
          localStorage.setItem('token_sala', tokenValido);
          if (data.nombre_real) {
            localStorage.setItem('nombre_real', data.nombre_real);
          } else {
            localStorage.removeItem('nombre_real');
          }
          if (data.rol) {
            localStorage.setItem('rol_usuario', data.rol);
          } else {
            localStorage.removeItem('rol_usuario');
          }
          // Redirección imperativa limpia al Dashboard principal
          window.location.replace("principal.html");
        } else {
          throw new Error('El backend no retornó un token válido');
        }

      } catch (error) {
        console.error('Error durante el login:', error);
        errorMsg.classList.add('visible');
      } finally {
        // Restaurar estado del botón
        submitBtn.textContent = "Entrar a la Plataforma";
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
      }
    });
  </script>
</body>

</html>
